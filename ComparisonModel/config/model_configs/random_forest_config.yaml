model_name: 'random_forest'

model:
  n_estimators: 100
  max_depth: 10
  min_samples_split: 10
  min_samples_leaf: 5
  class_weight: 'balanced'
  random_state: 42
  n_jobs: -1

training_params:
  epochs: 1
  batch_size: 24

checkpoint_dir: 'checkpoints/random_forest'
log_dir: 'logs/random_forest'
results_dir: 'results/random_forest'

dataset_config: 'config/dataset_config.yaml'
