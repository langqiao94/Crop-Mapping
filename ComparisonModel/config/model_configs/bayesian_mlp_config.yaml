model_name: 'bayesian_mlp'

model:
  cnn_channels: [64, 128, 256, 512]
  mlp_dims: [512, 256]
  dropout: 0.3
  priors:
    prior_mu: 0.0
    prior_sigma: 0.1

training_params:
  beta: 1.0e-6
  num_samples: 1
  uncertainty_samples: 100
  class_weights: [0.5, 2.0, 10.0, 1.5, 15.0, 50.0]

checkpoint_dir: 'checkpoints/bayesian_mlp'
log_dir: 'logs/bayesian_mlp'
results_dir: 'results/bayesian_mlp'

dataset_config: 'config/dataset_config.yaml'
